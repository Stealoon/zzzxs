server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    druid:
      driver-class-name: ${studyroom.datasource.driver-class-name}
      url: jdbc:mysql://${studyroom.datasource.host}:${studyroom.datasource.port}/${studyroom.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${studyroom.datasource.username}
      password: ${studyroom.datasource.password}
  redis:
    host: ${studyroom.redis.host}
    port: ${studyroom.redis.port}
    #password: ${studyroom.redis.password}
    database: ${studyroom.redis.database}

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.studyroom.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      studyroom:
        mapper: debug
        service: info
        controller: info

studyroom:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: itcast
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    user-secret-key: zhxs
    user-ttl: 7200000
    user-token-name: authentication

  wechat:
    appid: ${studyroom.wechat.appid}
    secret: ${studyroom.wechat.secret}

  chat:
    # 是否开启智能客服
    enabled: false
    # 大模型接口地址
    base-url: ${studyroom.chat.base-url}
    # API密钥
    api-key: ${studyroom.chat.api-key}
    # 模型名称
    model: ${studyroom.chat.model}
    # 最大上下文轮数
    context-max-rounds: 5
    # 上下文过期时间（分钟）
    context-ttl-minutes: 30

  upload:
    path: ${studyroom.upload.path}
